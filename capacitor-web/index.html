<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>GetOut</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, sans-serif;
        background: #f5f7f4;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(480px, 100%);
        background: #fff;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 12px 48px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      code {
        font-family: ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GetOut mobile shell</h1>
      <p>
        Set <code>CAPACITOR_SERVER_URL</code> before running
        <code>npx cap sync android</code> so the native app points at your
        deployed Next.js site.
      </p>
    </main>
  </body>
  </html>
